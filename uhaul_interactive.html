<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Haul Load Planner</title>
<style>
  :root {
    --bg: #141412;
    --surface: #1e1e1b;
    --surface2: #252522;
    --border: #383835;
    --border2: #4a4a46;
    --text: #e8e6de;
    --text2: #9a9890;
    --text3: #5f5e5a;
    --accent: #e8a840;
    --accent2: #c8881e;
    --floor: #c8b89a;
    --floor-dark: #a89878;
    --truck-body: #2a2a28;
    --truck-wall: #1a1a18;
    --snap: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .logo span { color: var(--text3); font-weight: 400; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 6px 12px; border-radius: 4px; font-size: 11px; font-family: inherit;
    cursor: pointer; border: 1px solid var(--border2); background: var(--surface2);
    color: var(--text2); letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #1a1208; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn.danger { border-color: #8b3a3a; color: #c45a5a; }
  .btn.danger:hover { background: #8b3a3a; color: #f0a0a0; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 240px; min-width: 240px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .stat-key { font-size: 11px; color: var(--text2); }
  .stat-val { font-size: 12px; font-weight: 700; color: var(--text); }
  .stat-val.good { color: #6db87a; }
  .stat-val.warn { color: var(--accent); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s; }

  .item-list { flex: 1; overflow-y: auto; padding: 8px; }
  .item-list::-webkit-scrollbar { width: 4px; }
  .item-list::-webkit-scrollbar-track { background: transparent; }
  .item-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .item-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 4px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; transition: all 0.1s; font-size: 11px;
  }
  .item-chip:hover { border-color: var(--border2); }
  .item-chip.selected { border-color: var(--accent); background: #2a2210; }
  .item-chip.on-floor { opacity: 0.5; }
  .chip-color { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chip-info { flex: 1; }
  .chip-name { color: var(--text); font-weight: 700; letter-spacing: 0.5px; }
  .chip-dims { color: var(--text3); font-size: 10px; margin-top: 1px; }
  .chip-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s; }
  .item-chip:hover .chip-actions { opacity: 1; }
  .chip-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 12px; padding: 2px 4px; border-radius: 2px; }
  .chip-btn:hover { color: var(--text); background: var(--border); }
  .chip-btn.del:hover { color: #c45a5a; }

  .canvas-wrap { flex: 1; overflow: auto; padding: 24px; background: var(--bg); position: relative; }
  .canvas-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
  .canvas-wrap::-webkit-scrollbar-track { background: transparent; }
  .canvas-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .truck-outer {
    position: relative; margin: 0 auto;
    background: var(--truck-wall); border-radius: 10px;
    border: 2px solid #4a4a46;
  }
  .truck-label {
    text-align: center; font-size: 10px; letter-spacing: 2px;
    color: var(--text3); text-transform: uppercase; padding: 4px 0;
  }
  .attic {
    margin: 0 14px; background: #383835; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 2px;
  }
  .attic-label { font-size: 10px; letter-spacing: 1.5px; color: var(--text2); text-transform: uppercase; font-weight: 700; }
  .attic-sub { font-size: 9px; color: var(--text3); }
  .cab-wall {
    margin: 4px 14px 0; height: 8px; background: #4a4a46; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .cab-wall-label { font-size: 7px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; }

  .floor-wrap { margin: 2px 14px; position: relative; }
  #floor {
    position: relative; background: var(--floor);
    border-radius: 3px; overflow: hidden;
  }
  .floor-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
  }
  .floor-ft-marker {
    position: absolute; left: 0; right: 0; height: 1px;
    background: rgba(0,0,0,0.12); pointer-events: none;
  }
  .floor-ft-label {
    position: absolute; left: 2px; font-size: 8px; color: rgba(0,0,0,0.3);
    font-family: 'Courier New', monospace; pointer-events: none; line-height: 1;
  }

  .door-wall {
    margin: 0 14px 4px; height: 8px; background: #4a4a46; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .door-wall-label { font-size: 7px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

  .dim-label {
    text-align: center; font-size: 10px; color: var(--text3); font-family: 'Courier New', monospace;
    padding: 3px 0;
  }
  .dim-side {
    position: absolute; right: -36px; top: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    width: 34px;
  }
  .dim-side-text {
    font-size: 9px; color: var(--text3); font-family: 'Courier New', monospace;
    transform: rotate(90deg); white-space: nowrap;
  }

  .floor-item {
    position: absolute; border-radius: 3px; cursor: grab;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; user-select: none; transition: box-shadow 0.1s, opacity 0.1s;
    border: 1.5px solid rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .floor-item:active { cursor: grabbing; }
  .floor-item.dragging { opacity: 0.85; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 1000; cursor: grabbing; }
  .floor-item.selected { outline: 2px solid var(--accent); outline-offset: 1px; }
  .floor-item.wall-item { cursor: default; opacity: 0.6; }
  .item-name { font-size: 9px; font-weight: 700; font-family: 'Courier New', monospace; color: white; line-height: 1.2; padding: 0 2px; }
  .item-dims { font-size: 8px; font-family: 'Courier New', monospace; color: rgba(255,255,255,0.7); line-height: 1.2; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; padding: 24px; width: 340px; max-width: 90vw;
  }
  .modal h3 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 10px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 4px; color: var(--text); font-family: inherit; font-size: 12px;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .color-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .color-swatch {
    width: 24px; height: 24px; border-radius: 3px; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.1s;
  }
  .color-swatch.selected { border-color: white; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 4px; padding: 10px 16px;
    font-size: 11px; color: var(--text2); z-index: 3000; opacity: 0;
    transition: opacity 0.2s; pointer-events: none; letter-spacing: 0.5px;
  }
  .toast.show { opacity: 1; }

  .snap-toggle { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text3); }
  .toggle-input { appearance: none; width: 28px; height: 14px; background: var(--border); border-radius: 7px; cursor: pointer; position: relative; transition: background 0.2s; }
  .toggle-input:checked { background: var(--accent); }
  .toggle-input::after { content: ''; position: absolute; width: 10px; height: 10px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: transform 0.2s; }
  .toggle-input:checked::after { transform: translateX(14px); }
</style>
</head>
<body>

<header>
  <div class="logo">U-Haul <span>/ Load Planner</span></div>
  <div class="header-actions">
    <label class="snap-toggle">
      <input type="checkbox" class="toggle-input" id="snapToggle" checked>
      Snap to grid
    </label>
    <button class="btn" onclick="openModal()">+ Add item</button>
    <button class="btn" onclick="resetLayout()">Reset layout</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Floor usage</div>
      <div class="stat-row"><span class="stat-key">Total floor</span><span class="stat-val">190 sq ft</span></div>
      <div class="stat-row"><span class="stat-key">Items placed</span><span class="stat-val" id="statUsed">— sq ft</span></div>
      <div class="stat-row"><span class="stat-key">Remaining</span><span class="stat-val good" id="statFree">— sq ft</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Items <span style="color:var(--text3);font-size:9px">(click to select)</span></div>
    </div>
    <div class="item-list" id="itemList"></div>
  </div>

  <div class="canvas-wrap">
    <div class="truck-outer" id="truckOuter">
      <div class="truck-label">26' U-Haul — overhead view (cab front)</div>
      <div class="dim-label" id="widthLabel">8'1" (97")</div>
      <div class="attic" id="atticEl">
        <div class="attic-label">Mom's Attic</div>
        <div class="attic-sub">2'7" × 8'1" — TVs, fragile boxes</div>
      </div>
      <div class="cab-wall"><div class="cab-wall-label">cab wall — load first</div></div>
      <div class="floor-wrap" id="floorWrap">
        <div id="floor"></div>
        <div class="dim-side" id="dimSide"><div class="dim-side-text" id="heightLabel">23'6"</div></div>
      </div>
      <div class="door-wall"><div class="door-wall-label">rear door — load last / unload first</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal">
    <h3 id="modalTitle">Add item</h3>
    <div class="field">
      <label>Name</label>
      <input type="text" id="itemName" placeholder="e.g. Dresser">
    </div>
    <div class="field field-row">
      <div>
        <label>Width (inches)</label>
        <input type="number" id="itemW" placeholder="36" min="6" max="120">
      </div>
      <div>
        <label>Depth (inches)</label>
        <input type="number" id="itemD" placeholder="24" min="6" max="120">
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <select id="itemCat">
        <option value="furniture">Furniture</option>
        <option value="appliance">Appliance / equipment</option>
        <option value="storage">Storage / boxes</option>
        <option value="tool">Tools / workbench</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="itemNotes" placeholder="e.g. heavy, load first">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn danger" id="deleteBtn" style="display:none" onclick="deleteItem()">Delete</button>
      <button class="btn primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = [
  '#633806','#854F0B','#26215C','#185FA5','#0F6E56',
  '#5f5e5a','#444441','#993C1D','#3C3489','#085041',
  '#7a2020','#1a5a3a','#4a3a80','#805020','#2a6080'
];

const SCALE = 34; // px per foot
const FLOOR_W_IN = 97; // 8'1" in inches
const FLOOR_L_IN = 282; // 23'6" in inches
const SNAP_PX = SCALE / 3; // ~11px snap grid

let items = [];
let selectedId = null;
let editingId = null;
let selectedColor = COLORS[0];
let snapEnabled = true;
let dragState = null;
let saveTimer = null;

const floor = document.getElementById('floor');

function inToPx(inches) { return (inches / 12) * SCALE; }
function pxToIn(px) { return Math.round((px / SCALE) * 12); }
function sqFt(wIn, dIn) { return (wIn * dIn) / 144; }

function initSize() {
  const floorPxW = inToPx(FLOOR_W_IN);
  const floorPxL = inToPx(FLOOR_L_IN);
  floor.style.width = floorPxW + 'px';
  floor.style.height = floorPxL + 'px';

  const attic = document.getElementById('atticEl');
  attic.style.height = inToPx(31) + 'px';
  attic.style.width = floorPxW + 'px';
  attic.style.marginLeft = '14px';

  document.getElementById('truckOuter').style.width = (floorPxW + 28 + 50) + 'px';

  const grid = document.createElement('div');
  grid.className = 'floor-grid';
  grid.style.backgroundSize = `${SCALE}px ${SCALE}px`;
  floor.appendChild(grid);

  for (let ft = 1; ft < 23; ft++) {
    const y = ft * SCALE;
    const marker = document.createElement('div');
    marker.className = 'floor-ft-marker';
    marker.style.top = y + 'px';
    floor.appendChild(marker);
    const lbl = document.createElement('div');
    lbl.className = 'floor-ft-label';
    lbl.style.top = (y + 2) + 'px';
    lbl.textContent = ft + "'";
    floor.appendChild(lbl);
  }
}

function defaultItems() {
  return [
    { id: uid(), name: 'Futon (lean)', wIn: 72, dIn: 4, color: '#888780', cat: 'furniture', notes: 'lean against left wall', x: 0, y: 0, placed: true, wall: true },
    { id: uid(), name: 'Leslie speaker', wIn: 22, dIn: 29, color: '#633806', cat: 'appliance', notes: '1.8\'×2.4\'', x: inToPx(4), y: inToPx(2), placed: true },
    { id: uid(), name: 'Highboy', wIn: 36, dIn: 22, color: '#444441', cat: 'furniture', notes: '36"×22"', x: inToPx(24), y: inToPx(2), placed: true },
    { id: uid(), name: 'Dresser', wIn: 40, dIn: 18, color: '#5f5e5a', cat: 'furniture', notes: '39.5"×18"', x: inToPx(4), y: inToPx(32), placed: true },
    { id: uid(), name: 'Husky cabinet', wIn: 36, dIn: 18, color: '#3a3a38', cat: 'furniture', notes: '36"×18"', x: inToPx(44), y: inToPx(32), placed: true },
    { id: uid(), name: 'Bookshelf', wIn: 48, dIn: 12, color: '#185FA5', cat: 'furniture', notes: '48"×12"', x: inToPx(4), y: inToPx(52), placed: true },
    { id: uid(), name: 'Workbench', wIn: 20, dIn: 68, color: '#888780', cat: 'tool', notes: '20"×68"', x: inToPx(73), y: inToPx(2), placed: true },
    { id: uid(), name: 'Stereo cabinet', wIn: 55, dIn: 18, color: '#26215C', cat: 'furniture', notes: '55"×18"', x: inToPx(4), y: inToPx(68), placed: true },
    { id: uid(), name: 'Blanket chest', wIn: 24, dIn: 48, color: '#854F0B', cat: 'storage', notes: '24"×48"', x: inToPx(4), y: inToPx(88), placed: true },
    { id: uid(), name: 'BR table', wIn: 24, dIn: 42, color: '#0F6E56', cat: 'furniture', notes: '24"×42"', x: inToPx(30), y: inToPx(88), placed: true },
    { id: uid(), name: 'Coffee table', wIn: 24, dIn: 42, color: '#0F6E56', cat: 'furniture', notes: '24"×42"', x: inToPx(56), y: inToPx(88), placed: true },
    { id: uid(), name: 'TV table', wIn: 18, dIn: 30, color: '#185FA5', cat: 'furniture', notes: '18"×30"', x: inToPx(4), y: inToPx(148), placed: true },
    { id: uid(), name: 'Tool bench', wIn: 18, dIn: 48, color: '#633806', cat: 'tool', notes: '18"×48"', x: inToPx(24), y: inToPx(148), placed: true },
    { id: uid(), name: 'Bin 1', wIn: 20, dIn: 30, color: '#0C447C', cat: 'storage', notes: '20"×30"', x: inToPx(4), y: inToPx(202), placed: true },
    { id: uid(), name: 'Bin 2', wIn: 20, dIn: 30, color: '#0C447C', cat: 'storage', notes: '20"×30"', x: inToPx(26), y: inToPx(202), placed: true },
    { id: uid(), name: 'Bin 3', wIn: 20, dIn: 30, color: '#0C447C', cat: 'storage', notes: '20"×30"', x: inToPx(48), y: inToPx(202), placed: true },
    { id: uid(), name: 'Boxes (kitchen)', wIn: 24, dIn: 24, color: '#5f5e5a', cat: 'storage', notes: 'kitchen boxes', x: inToPx(70), y: inToPx(202), placed: true },
  ];
}

function uid() { return Math.random().toString(36).slice(2, 9); }

async function load() {
  try {
    const r = await window.storage.get('uhaul-items');
    if (r && r.value) {
      items = JSON.parse(r.value);
    } else {
      items = defaultItems();
    }
  } catch(e) {
    items = defaultItems();
  }
  render();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await window.storage.set('uhaul-items', JSON.stringify(items));
      showToast('Saved');
    } catch(e) { showToast('Save failed'); }
  }, 800);
}

async function resetLayout() {
  if (!confirm('Reset to default layout? This cannot be undone.')) return;
  items = defaultItems();
  selectedId = null;
  render();
  try { await window.storage.set('uhaul-items', JSON.stringify(items)); } catch(e){}
  showToast('Layout reset');
}

function render() {
  floor.querySelectorAll('.floor-item').forEach(e => e.remove());
  items.forEach(item => {
    if (!item.placed) return;
    const el = document.createElement('div');
    el.className = 'floor-item' + (item.wall ? ' wall-item' : '') + (item.id === selectedId ? ' selected' : '');
    el.dataset.id = item.id;
    const pw = inToPx(item.wIn);
    const ph = inToPx(item.dIn);
    el.style.cssText = `left:${item.x}px;top:${item.y}px;width:${pw}px;height:${ph}px;background:${item.color};`;

    const name = document.createElement('div');
    name.className = 'item-name';
    name.textContent = item.name;
    el.appendChild(name);

    if (ph > 30) {
      const dims = document.createElement('div');
      dims.className = 'item-dims';
      dims.textContent = item.wIn + '"×' + item.dIn + '"';
      el.appendChild(dims);
    }

    if (!item.wall) {
      el.addEventListener('mousedown', startDrag);
      el.addEventListener('click', (e) => { e.stopPropagation(); selectItem(item.id); });
      el.addEventListener('dblclick', (e) => { e.stopPropagation(); openModal(item.id); });
    }
    floor.appendChild(el);
  });

  renderSidebar();
  updateStats();
}

function renderSidebar() {
  const list = document.getElementById('itemList');
  list.innerHTML = '';
  items.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'item-chip' + (item.id === selectedId ? ' selected' : '') + (item.placed ? ' on-floor' : '');
    chip.innerHTML = `
      <div class="chip-color" style="background:${item.color}"></div>
      <div class="chip-info">
        <div class="chip-name">${item.name}</div>
        <div class="chip-dims">${item.wIn}"×${item.dIn}" · ${sqFt(item.wIn,item.dIn).toFixed(1)} sq ft</div>
      </div>
      <div class="chip-actions">
        <button class="chip-btn" onclick="openModal('${item.id}');event.stopPropagation()">✎</button>
        <button class="chip-btn del" onclick="confirmDelete('${item.id}');event.stopPropagation()">✕</button>
      </div>`;
    chip.addEventListener('click', () => selectItem(item.id));
    list.appendChild(chip);
  });
}

function updateStats() {
  const used = items.filter(i => i.placed && !i.wall).reduce((s, i) => s + sqFt(i.wIn, i.dIn), 0);
  const total = 190;
  const free = total - used;
  const pct = Math.min(100, (used / total) * 100);
  document.getElementById('statUsed').textContent = used.toFixed(1) + ' sq ft';
  const freeEl = document.getElementById('statFree');
  freeEl.textContent = free.toFixed(1) + ' sq ft';
  freeEl.className = 'stat-val ' + (pct > 85 ? 'warn' : 'good');
  document.getElementById('progressFill').style.width = pct + '%';
}

function selectItem(id) {
  selectedId = (selectedId === id) ? null : id;
  render();
}

floor.addEventListener('click', () => { selectedId = null; render(); });

function startDrag(e) {
  if (e.button !== 0) return;
  e.preventDefault();
  const el = e.currentTarget;
  const id = el.dataset.id;
  const item = items.find(i => i.id === id);
  if (!item) return;

  const rect = floor.getBoundingClientRect();
  const offsetX = e.clientX - rect.left - item.x;
  const offsetY = e.clientY - rect.top - item.y;

  el.classList.add('dragging');
  selectedId = id;

  dragState = { id, el, offsetX, offsetY };

  function onMove(e) {
    if (!dragState) return;
    const rect = floor.getBoundingClientRect();
    let x = e.clientX - rect.left - dragState.offsetX;
    let y = e.clientY - rect.top - dragState.offsetY;

    const floorW = inToPx(FLOOR_W_IN);
    const floorL = inToPx(FLOOR_L_IN);
    const pw = inToPx(item.wIn);
    const ph = inToPx(item.dIn);

    x = Math.max(0, Math.min(floorW - pw, x));
    y = Math.max(0, Math.min(floorL - ph, y));

    if (snapEnabled) {
      x = Math.round(x / SNAP_PX) * SNAP_PX;
      y = Math.round(y / SNAP_PX) * SNAP_PX;
    }

    dragState.el.style.left = x + 'px';
    dragState.el.style.top = y + 'px';
    item.x = x;
    item.y = y;
  }

  function onUp() {
    if (!dragState) return;
    dragState.el.classList.remove('dragging');
    dragState = null;
    render();
    scheduleSave();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function buildColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => {
      selectedColor = c;
      grid.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    };
    grid.appendChild(sw);
  });
}

function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const del = document.getElementById('deleteBtn');

  if (editingId) {
    const item = items.find(i => i.id === editingId);
    title.textContent = 'Edit item';
    document.getElementById('itemName').value = item.name;
    document.getElementById('itemW').value = item.wIn;
    document.getElementById('itemD').value = item.dIn;
    document.getElementById('itemCat').value = item.cat || 'furniture';
    document.getElementById('itemNotes').value = item.notes || '';
    selectedColor = item.color;
    del.style.display = 'block';
  } else {
    title.textContent = 'Add item';
    document.getElementById('itemName').value = '';
    document.getElementById('itemW').value = '';
    document.getElementById('itemD').value = '';
    document.getElementById('itemCat').value = 'furniture';
    document.getElementById('itemNotes').value = '';
    selectedColor = COLORS[0];
    del.style.display = 'none';
  }
  buildColorGrid();
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('itemName').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  editingId = null;
}

function saveItem() {
  const name = document.getElementById('itemName').value.trim();
  const wIn = parseInt(document.getElementById('itemW').value);
  const dIn = parseInt(document.getElementById('itemD').value);
  const cat = document.getElementById('itemCat').value;
  const notes = document.getElementById('itemNotes').value.trim();

  if (!name || !wIn || !dIn) { showToast('Fill in name and dimensions'); return; }

  if (editingId) {
    const item = items.find(i => i.id === editingId);
    Object.assign(item, { name, wIn, dIn, cat, notes, color: selectedColor });
  } else {
    items.push({ id: uid(), name, wIn, dIn, cat, notes, color: selectedColor, x: 10, y: 10, placed: true });
  }

  closeModal();
  render();
  scheduleSave();
}

function confirmDelete(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (!confirm('Delete "' + item.name + '"?')) return;
  items = items.filter(i => i.id !== id);
  if (selectedId === id) selectedId = null;
  render();
  scheduleSave();
}

function deleteItem() {
  if (!editingId) return;
  closeModal();
  confirmDelete(editingId);
}

document.getElementById('snapToggle').addEventListener('change', e => {
  snapEnabled = e.target.checked;
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId && document.getElementById('modalOverlay').style.display === 'none') {
    confirmDelete(selectedId);
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

initSize();
load();
</script>
</body>
